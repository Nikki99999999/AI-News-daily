name: fetch-ai-news

# 每天定时抓取 AI 行业新闻候选，滚动累积到 data/latest.json（9 天窗口），供云端周报 routine 读整周
# 周报每周一 08:00 生成上周整周，靠每日抓取累积才不漏早几天的新闻（RSS 只留最新数十条，单次抓不满一周）
on:
  schedule:
    - cron: "0 23 * * *"      # UTC 23:00 = 上海次日 07:00（每天抓，累积成滚动窗口；周一这次覆盖到上周日）
  workflow_dispatch: {}        # 支持网页端手动触发

permissions:
  contents: write              # 允许 commit 回仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 抓取新闻候选（滚动累积 9 天窗口）
        run: python fetch_news.py --hours 36 --rolling 9 --out data/latest.json

      - name: 提交更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "data: update latest.json ($(date -u +%Y-%m-%d))"
          git push
